# NeonRoot arch-dev tmux config, with session saving.
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 10

# Session saving (resurrect + continuum). The resurrect dir lives under the
# workspace, so a saved session travels with it (and commits, if you want).
set -g @resurrect-dir '/workspace/.tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
run-shell /root/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell /root/.tmux/plugins/tmux-continuum/continuum.tmux
